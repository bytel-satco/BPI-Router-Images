# .github/workflows/ubuntu.yml
name: Ubuntu

on:
  workflow_dispatch:
    inputs:
      bpi-r2:
        type: boolean
      bpi-r64:
        type: boolean
      bpi-r2pro:
        type: boolean
      bpi-r3:
        type: boolean
      bpi-r4:
        type: boolean
      packages:
        description: additional packages (separated by space)
      kernel:
        type: choice
        description: linux kernel
        options:
          - 6.19
          - 6.18
          - 6.12
          - 6.6
          - 5.15
      variant:
        type: choice
        description: board variant
        options:
          - ''
          - bpi-r4-2g5
          - bpi-r4pro
          - bpi-r4lite
      bootdevice:
        type: choice
        description: Bootdevice
        options:
          - sdmmc
          - emmc

jobs:
  ubuntu-build-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup env
        run: echo "DT=$(date +'%Y-%m-%d_%H%M')" >> $GITHUB_ENV

      - name: Compute release name
        run: |
          BOARDS=""
          [ "${{ inputs.bpi-r2 }}"    = "true" ] && BOARDS="${BOARDS}bpi-r2-"
          [ "${{ inputs.bpi-r64 }}"   = "true" ] && BOARDS="${BOARDS}bpi-r64-"
          [ "${{ inputs.bpi-r2pro }}" = "true" ] && BOARDS="${BOARDS}bpi-r2pro-"
          [ "${{ inputs.bpi-r3 }}"    = "true" ] && BOARDS="${BOARDS}bpi-r3-"
          [ "${{ inputs.bpi-r4 }}"    = "true" ] && BOARDS="${BOARDS}bpi-r4-"
          BOARDS="${BOARDS%-}"
          VARIANT="${{ inputs.variant }}"
          [ -n "$VARIANT" ] && BOARDS="${BOARDS}-${VARIANT}"
          echo "BOARDS=$BOARDS" >> $GITHUB_ENV
          echo "TAG_NAME=ubuntu-noble-k${{ inputs.kernel }}-${BOARDS}-${{ inputs.bootdevice }}-${{ env.DT }}" >> $GITHUB_ENV
          echo "RELEASE_NAME=Ubuntu noble | kernel ${{ inputs.kernel }} | ${BOARDS} | ${{ inputs.bootdevice }} | ${{ env.DT }}" >> $GITHUB_ENV

      - name: Setup cache
        id: cache
        uses: actions/cache@v4
        with:
          path: "*_arm*.tar.gz"
          key: ${{ runner.os }}-chroot
          restore-keys: ${{ runner.os }}-chroot

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3 python3-requests parted qemu-user-static debootstrap binfmt-support mtd-utils

      - name: Build R2 Ubuntu noble Image
        if: ${{ inputs.bpi-r2 }}
        run: |
          echo "userpackages=\"${{ inputs.packages }}\"" >> sourcefiles_bpi-r2.conf
          ./buildimg.sh bpi-r2 noble ${{ inputs.kernel }}

      - name: Build R64 Ubuntu noble Image
        if: ${{ inputs.bpi-r64 }}
        run: |
          echo "userpackages=\"${{ inputs.packages }}\"" >> sourcefiles_bpi-r64.conf
          ./buildimg.sh bpi-r64 noble ${{ inputs.kernel }}

      - name: Build R2Pro Ubuntu noble Image
        if: ${{ inputs.bpi-r2pro }}
        run: |
          echo "userpackages=\"${{ inputs.packages }}\"" >> sourcefiles_bpi-r2pro.conf
          ./buildimg.sh bpi-r2pro noble ${{ inputs.kernel }}

      - name: Build R3 Ubuntu noble Image
        if: ${{ inputs.bpi-r3 }}
        run: |
          echo "userpackages=\"${{ inputs.packages }}\"" >> sourcefiles_bpi-r3.conf
          ./buildimg.sh bpi-r3 noble ${{ inputs.kernel }}

      - name: Build R4 Ubuntu noble Image
        if: ${{ inputs.bpi-r4 }}
        run: |
          echo "variant=${{ inputs.variant }}" > sourcefiles_bpi-r4.conf
          echo "replacehostapd=1" >> sourcefiles_bpi-r4.conf
          echo "replaceiperf=1" >> sourcefiles_bpi-r4.conf
          echo "userpackages=\"${{ inputs.packages }}\"" >> sourcefiles_bpi-r4.conf
          ./buildimg.sh bpi-r4 noble ${{ inputs.kernel }}

      - name: Create GitHub Release
        if: always()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.RELEASE_NAME }}
          files: ./*.img.gz
          fail_on_unmatched_files: false
          token: ${{ secrets.GITHUB_TOKEN }}
